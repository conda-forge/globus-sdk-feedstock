schema_version: 1

context:
  name: globus-sdk
  version: 4.4.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: c89c917e4a0879b8140f62068e2f20eea8efb50d911ba189cf632491fd2694c1

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.2
  run:
    - python >=${{ python_min }}
    - cryptography >=3.3.1,!=3.4.0
    - pyjwt >=2.0.0,<3.0.0
    # pyjwt[crypto] has different constraints on cryptography depending on the version
    - requests >=2.19.1,<3.0.0
    # from upstream, this is only for py<3.11 but we'll try to keep this noarch
    - typing_extensions >=4.0

tests:
  - python:
      imports:
        - globus_sdk
        - globus_sdk.authorizers
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Globus SDK for Python
  description: This SDK provides a convenient Pythonic interface to Globus APIs.
  homepage: https://github.com/globus/globus-sdk-python
  repository: https://github.com/globus/globus-sdk-python
  documentation: http://globus-sdk-python.readthedocs.io/

extra:
  recipe-maintainers:
    - xylar
